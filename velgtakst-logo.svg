<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#285982"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- V -->
  <text x="148" y="355" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="280" fill="white" letter-spacing="-12">V</text>
  <!-- T -->
  <text x="290" y="355" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="280" fill="#4EADD6" letter-spacing="-12">T</text>
  <!-- Subtle checkmark accent on the V -->
  <line x1="138" y1="365" x2="260" y2="365" stroke="#4EADD6" stroke-width="6" stroke-linecap="round"/>
</svg>
